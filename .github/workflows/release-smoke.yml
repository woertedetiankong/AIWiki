name: Release Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/release-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tests/**"
      - "README.md"
      - "docs/**"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-check:
    name: release:check + Codex eval
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

      - name: Codex-owned workflow eval
        run: npm run eval:usability -- --format json

  pack-install-smoke:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 22
          - 24

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Install tarball and smoke SQLite index
        run: |
          mkdir -p "$RUNNER_TEMP/aiwiki-install-smoke"
          cd "$RUNNER_TEMP/aiwiki-install-smoke"
          npm init -y
          tarball="$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.tgz" | head -n 1)"
          test -n "$tarball"
          npm install "$tarball"
          npx aiwiki --version
          npx aiwiki init --project-name smoke
          npx aiwiki index build
          npx aiwiki search smoke --index
